<!-- 画面上部のナビゲーションバー -->
<mat-toolbar color="primary">

  <!-- 中央スペース埋め: flex: 1 で残り幅を全部この span が吸収する -->
  <span style="flex: 1"></span>

  <!-- カートアイコンボタン -->
  <!-- mat-icon-button: アイコン1つだけを乗せる丸いボタン -->
  <!-- aria-label: スクリーンリーダー用の説明（アイコンだけだと意味が伝わらないため） -->
  <!-- matBadge: バッジ(数値)を表示する。totalQuantity()===0 のときは matBadgeHidden で自動的に隠れる -->
  <!-- Step 7-E-2: カートアイコンは @if の外に出して常時表示 (未サインイン時もアイコンは出る、バッジは空なら付かない) -->
  <a mat-icon-button routerLink="/cart" aria-label="カート"
  [matBadge]="cartService.totalQuantity()"
  [matBadgeHidden]="cartService.totalQuantity() === 0"
  matBadgeColor="warn"
  matBadgeSize="large">
    <mat-icon>shopping_cart</mat-icon>
  </a>

  <!-- サインイン状態でツールバー右側の表示を切り替え (Step 7-E-2) -->
  <!--   サインイン中 → ユーザー名 + プルダウンメニュー -->
  <!--   未サインイン → 「サインイン」ボタン (routerLink で /sign-in に飛ばす) -->
  @if (authService.signedIn()) {
  <!-- ユーザー名・ID表示 → クリックでプルダウンメニュー -->
  <!-- [matMenuTriggerFor]="userMenu" のカッコ[] は「プロパティバインディング」。-->
  <!-- userMenu は下の #userMenu="matMenu" で宣言した「テンプレート参照変数」を指す。-->
  <!-- authService.currentUser() は Signal<User | null>。signedIn() が true の中なので -->
  <!-- 実行時には必ず非 null だが、型システムには伝わらないので ?. (Optional chaining) を付ける -->
  <button mat-button [matMenuTriggerFor]="userMenu">
    {{ authService.currentUser()?.name }} (ID:{{ authService.currentUser()?.id }})
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <!-- プルダウンメニュー本体 -->
  <!-- #userMenu="matMenu" は「このメニューを userMenu という名前で参照できるようにする」宣言 -->
  <mat-menu #userMenu="matMenu">
    <a mat-menu-item routerLink="/user/settings">
      <mat-icon>person</mat-icon>
      <span>設定</span>
    </a>
    <a mat-menu-item routerLink="/user/password">
      <mat-icon>key</mat-icon>
      <span>パスワード変更</span>
    </a>
    <a mat-menu-item routerLink="/orders">
      <mat-icon>receipt_long</mat-icon>
      <span>購入履歴</span>
    </a>
    <!-- 区切り線 -->
    <mat-divider></mat-divider>

    <!-- サインアウト: ( ) は「イベントバインディング」-->
    <!-- (click)="signOut()" でクリック時にコンポーネントの signOut メソッドを呼ぶ -->
    <button mat-menu-item (click)="signOut()">
      <mat-icon>logout</mat-icon>
      <span>サインアウト</span>
    </button>
  </mat-menu>
  } @else {
  <!-- 未サインイン時はサインインボタンを表示 (Step 7-E-2) -->
  <a mat-button routerLink="/sign-in">サインイン</a>
  }
</mat-toolbar>


<!--
  各ルートに対応するコンポーネントが描画される場所
    .content-wrapper でくるんで本文の最大幅を制限し、左右の余白を margin: 0 auto で
    均等に配ることで、画面が広いときに本文が画面中央に寄るようにする
-->
<div class="content-wrapper">
  <router-outlet />
</div>
