<!--
  ─────────────────────────────────────────────────────
  Backoffice の画面骨格 (3層構造)
    mat-sidenav-container  ... 画面全体をくるむ Material のサイドナビ用ラッパー
      mat-sidenav           ... 左の固定サイドメニュー (サインイン時のみ表示)
      mat-sidenav-content   ... 右側 (Toolbar + ルートごとの本文)
  ─────────────────────────────────────────────────────
  height: 100vh = "viewport の高さいっぱい"
    mat-sidenav-container は内側コンテンツの高さに自動で揃わないため、明示が必要。

  Step 7-D-6 の変更点:
    - サイドメニューは @if (authService.signedIn()) で囲い、未サインイン時 (=/sign-in や
      /admin/signup) では表示しない
    - 右上の管理者名 + サインアウトメニューも同様にサインイン時のみ表示
    - 管理者名・ID は AuthService.currentAdmin() の signal から取得 (?. で null 対応)
-->
<mat-sidenav-container style="height: 100vh">

  <!--
    サイドメニュー本体 (サインイン時のみ表示)
      mode="side"     ... 本文を押しのける形で常時表示 (overlay の対義語)
      opened          ... 起動時に最初から開いている (= "opened='true'")
      style="width"   ... メニューの横幅を固定
  -->
  @if (authService.signedIn()) {
    <mat-sidenav mode="side" opened style="width: 220px">

      <!--
        mat-nav-list: 縦並びリスト + 各項目をリンク (a タグ) として扱う派生形
          routerLink: クリックで SPA 内遷移
          routerLinkActive: 現在URLがリンク先で始まるとき "active-nav" クラスを付与
        mat-icon に matListItemIcon を付けると Material のリスト項目内アイコン位置 (左端) にレイアウトされる
      -->
      <mat-nav-list>
        <a mat-list-item routerLink="/categories" routerLinkActive="active-nav">
          <mat-icon matListItemIcon>category</mat-icon>
          <span matListItemTitle>カテゴリ管理</span>
        </a>
        <a mat-list-item routerLink="/products" routerLinkActive="active-nav">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <span matListItemTitle>商品管理</span>
        </a>
        <a mat-list-item routerLink="/users" routerLinkActive="active-nav">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>ユーザー管理</span>
        </a>
        <!-- 注文履歴 (Phase 11 で追加)。受注一覧 + ユーザー/期間/支払方法での絞り込み画面へ -->
        <a mat-list-item routerLink="/orders" routerLinkActive="active-nav">
          <mat-icon matListItemIcon>receipt_long</mat-icon>
          <span matListItemTitle>注文履歴</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
  }

  <!--
    右側 (本文エリア)
      Toolbar はサイドメニュー導入に伴い「タイトル + 管理者プルダウン」のシンプル構成に変更
      (旧3ナビはサイドメニューに移行)
  -->
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <!-- タイトル: クリックでトップ (/) → ルート定義により /categories にリダイレクト -->
      <!-- font: var(--mat-sys-title-large) は Material 3 のタイトル用フォントトークン (約22px) -->
      <!-- mat-button を外したのはボタン側のフォントサイズ (約14px) が優先されてしまうため -->
      <a routerLink="/"
         style="font: var(--mat-sys-title-large); color: inherit;
                text-decoration: none; padding: 0 1rem; cursor: pointer;">
        EC SITE MANAGEMENT SYSTEM
      </a>

      <!-- 中央スペース埋め: flex で右側に管理者ボタンを寄せる -->
      <span style="flex: 1"></span>

      <!--
        管理者名プルダウン + サインアウトメニュー (サインイン時のみ表示)
          currentAdmin は signal<Admin | null> なので ?. で null を回避する。
          AuthGuard が保護ルートを守っているため、保護画面では実行時に null にならないが、
          型システム上は null 可能性があるため Optional chaining が必要。
      -->
      @if (authService.signedIn()) {
        <button mat-button [matMenuTriggerFor]="adminMenu">
          {{ authService.currentAdmin()?.name }} (ID:{{ authService.currentAdmin()?.id }})
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #adminMenu="matMenu">
          <button mat-menu-item (click)="signOut()">
            <mat-icon>logout</mat-icon>
            <span>サインアウト</span>
          </button>
        </mat-menu>
      }
    </mat-toolbar>

    <!--
      各ルートに対応するコンポーネントが描画される場所
        .content-wrapper でくるんで本文の最大幅を制限し、左右の余白を margin: 0 auto で
        均等に配ることで、画面が広いときに本文が画面中央に寄るようにする
    -->
    <div class="content-wrapper">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
