<div class="page">
  <!-- ─────────────────────────────────────────────────────
       ページヘッダー部: タイトル + 「新規作成」ボタン
       右側に作成ボタンを配置 (Step C で /users/new を実装するまではリンク先がワイルドカードで /categories に飛ぶことに注意)
       ───────────────────────────────────────────────────── -->
  <header class="page-header">
    <h2>ユーザー管理</h2>
    <!-- mat-flat-button + color="primary": 塗りつぶし型の主要アクションボタン -->
    <a mat-flat-button color="primary" routerLink="/users/new">
      <mat-icon>add</mat-icon>
      新規作成
    </a>
  </header>

  <!-- ─────────────────────────────────────────────────────
       検索欄: 氏名 + メールアドレスの OR 検索 (LIKE %xxx%)
         [formControl]="searchControl" で TS 側の FormControl と双方向バインド
         入力するたびに valueChanges Observable に流れ、debounceTime + switchMap 経由で API 呼び出し
         サーバー側 (Step 8-1) で OR: [name contains, email contains] を組んでいるので、
         このフロント側は単一の入力欄で OK (どちらかにヒットすれば結果に含まれる)
       ───────────────────────────────────────────────────── -->
  <section class="search-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>氏名・メールアドレスで検索</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput type="text" [formControl]="searchControl" placeholder="例: 山田 / yamada@example.com" />
    </mat-form-field>
  </section>

  <!-- ─────────────────────────────────────────────────────
       読み込み中 / 空 / データあり の3分岐
       @if / @else if / @else は Angular 17+ の新制御フロー
       ───────────────────────────────────────────────────── -->
  @if (loading()) {
    <p class="status-message">読み込み中…</p>
  } @else if (users().length === 0) {
    <!-- 0件の場合の空状態表示 -->
    <p class="status-message">ユーザーが登録されていません。</p>
  } @else {
    <!-- ─────────────────────────────────────────────────────
         mat-table: Material のテーブルコンポーネント
           [dataSource]   ... 表示する配列を渡す
           matColumnDef   ... 列の定義 (識別子と「ヘッダーセル」「データセル」のテンプレ)
           displayedColumns ... 表示する列の順序を識別子の配列で指定
         ───────────────────────────────────────────────────── -->
    <table mat-table [dataSource]="users()" class="table">

      <!-- ID 列 -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>

      <!-- 氏名 列 -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>氏名</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <!-- メールアドレス 列 -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>メールアドレス</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>

      <!-- 権限列は削除済み: customer 一色のため不要 -->

      <!-- 電話番号 列 (nullable: 未登録は '—' 表示)
           ?? は null/undefined フォールバック演算子 (詳細画面と同じ表現) -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>電話番号</th>
        <td mat-cell *matCellDef="let row">{{ row.phone ?? '—' }}</td>
      </ng-container>

      <!-- 作成日 列 ('yyyy-MM-dd' は DatePipe のフォーマット指定) -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>作成日</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'yyyy-MM-dd' }}</td>
      </ng-container>

      <!-- 操作 列: 詳細/編集/削除 ボタンの3つ
           ※ 詳細・編集は Step B / D で実装するまで /categories にリダイレクトされる
              (app.routes.ts のワイルドカード '**' に拾われるため) -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let row">
          <!-- 詳細: mat-stroked-button = 枠線スタイル -->
          <a mat-stroked-button [routerLink]="['/users', row.id]">詳細</a>
          <!-- 編集 -->
          <a mat-stroked-button [routerLink]="['/users', row.id, 'edit']">編集</a>
          <!-- 削除: color="warn" で赤色 (危険な操作の視覚的合図) -->
          <button mat-stroked-button color="warn" (click)="onDelete(row)">削除</button>
        </td>
      </ng-container>

      <!-- ヘッダー行とデータ行の定義: displayedColumns に従って描画される -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  }

  <!-- ─────────────────────────────────────────────────────
       mat-paginator: Material のページ送り UI
         [length]            ... 全件数 (total signal)
         [pageSize]          ... 1 ページあたりの件数 (pageSize signal)
         [pageIndex]         ... 現在のページ番号 (0 起点) (pageIndex signal)
         [pageSizeOptions]   ... プルダウンで選べるサイズ候補
         (page)              ... ページ変更時に PageEvent を発火
       loading 中以外は常に表示 (検索で 0 件になっても「前ページに戻る」操作を可能にするため)
       ───────────────────────────────────────────────────── -->
  @if (!loading()) {
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
