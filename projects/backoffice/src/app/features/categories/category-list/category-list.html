<div class="page">
  <!-- ─────────────────────────────────────────────────────
       ページヘッダー部: タイトル + 「新規作成」ボタン
       右側に作成ボタンを配置 (justify-content: space-between を使用)
       ───────────────────────────────────────────────────── -->
  <header class="page-header">
    <h2>カテゴリ管理</h2>
    <!-- mat-flat-button + color="primary": 塗りつぶし型の主要アクションボタン -->
    <a mat-flat-button color="primary" routerLink="/categories/new">
      <mat-icon>add</mat-icon>
      新規作成
    </a>
  </header>

  <!-- ─────────────────────────────────────────────────────
       検索欄: カテゴリ名であいまい検索 (LIKE %xxx%)
         [formControl]="searchControl" で TS 側の FormControl と双方向バインド
         入力するたびに valueChanges Observable に流れ、debounceTime + switchMap 経由で API 呼び出し
         matPrefix の search アイコンは虫眼鏡をフィールド左に表示するための装飾
       ───────────────────────────────────────────────────── -->
  <section class="search-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>カテゴリ名で検索</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput type="text" [formControl]="searchControl" placeholder="例: 毛糸" />
    </mat-form-field>
  </section>

  <!-- ─────────────────────────────────────────────────────
       読み込み中の表示 (loading signal が true のとき)
       @if は Angular 17+ の新構文 (旧 *ngIf に相当する制御フロー)
       ───────────────────────────────────────────────────── -->
  @if (loading()) {
    <p class="status-message">読み込み中…</p>
  } @else {
    @if (categories().length === 0) {
      <!-- 0件の場合の空状態表示 (検索結果が 0 件のケースも含む) -->
      <p class="status-message">カテゴリが登録されていません。</p>
    } @else {
      <!-- ─────────────────────────────────────────────────────
           mat-table: Material のテーブルコンポーネント
             [dataSource]   ... 表示する配列を渡す
             matColumnDef   ... 列の定義 (識別子と「ヘッダーセル」「データセル」のテンプレ)
             displayedColumns ... 表示する列の順序を識別子の配列で指定
           ───────────────────────────────────────────────────── -->
      <table mat-table [dataSource]="categories()" class="table">

        <!-- ID 列 -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let row">{{ row.id }}</td>
        </ng-container>

        <!-- カテゴリ名 列 -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>カテゴリ名</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <!-- 表示順 列 (商品一覧画面でカテゴリを並べる際の順序。小さい値ほど先) -->
        <ng-container matColumnDef="displayOrder">
          <th mat-header-cell *matHeaderCellDef>表示順</th>
          <td mat-cell *matCellDef="let row">{{ row.displayOrder }}</td>
        </ng-container>

        <!-- 作成日 列 ('yyyy-MM-dd' は DatePipe のフォーマット指定) -->
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>作成日</th>
          <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'yyyy-MM-dd' }}</td>
        </ng-container>

        <!-- 操作 列: 詳細/編集/削除 ボタンの3つ -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let row">
            <!-- 詳細: mat-stroked-button = 枠線スタイル -->
            <a mat-stroked-button [routerLink]="['/categories', row.id]">詳細</a>
            <!-- 編集 -->
            <a mat-stroked-button [routerLink]="['/categories', row.id, 'edit']">編集</a>
            <!-- 削除: color="warn" で赤色 (危険な操作の視覚的合図) -->
            <button mat-stroked-button color="warn" (click)="onDelete(row)">削除</button>
          </td>
        </ng-container>

        <!-- ヘッダー行とデータ行の定義: displayedColumns に従って描画される -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }

    <!-- ─────────────────────────────────────────────────────
         mat-paginator: Material のページ送り UI
           [length]           ... 全件数 (← total signal)
           [pageSize]         ... 1 ページあたりの件数 (← pageSize signal)
           [pageIndex]        ... 現在のページ番号 (0 起点) (← pageIndex signal)
           [pageSizeOptions]  ... プルダウンで選べるサイズ候補
           (page)             ... ページ変更時に PageEvent を発火
         0 件のときも表示することで、検索で 0 件になった際に「前ページに戻る」操作を可能にする
         ───────────────────────────────────────────────────── -->
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
