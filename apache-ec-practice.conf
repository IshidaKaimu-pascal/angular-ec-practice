# ============================================================
# Apache VirtualHost 設定 (Cloud9 / Amazon Linux 2 / Amazon Linux 2023 想定)
#
# 配置先: /etc/httpd/conf.d/ec-practice.conf
# 反映:   sudo systemctl restart httpd
#
# 構成:
#   /            → /var/www/html/             (storefront: 顧客側 Angular SPA)
#   /backoffice/ → /var/www/html/backoffice/  (backoffice: 管理者側 Angular SPA)
#   /api/*       → http://localhost:3000/*    (Express API への reverse proxy)
#   /static/*    → http://localhost:3000/static/* (商品画像 / アップロード画像)
#
# 前提モジュール (Amazon Linux の httpd は通常デフォルトで有効):
#   - mod_proxy
#   - mod_proxy_http
#   - mod_rewrite
#   無効になっている場合は /etc/httpd/conf.modules.d/ 配下で LoadModule を有効化
# ============================================================

<VirtualHost *:80>
    ServerName _default_
    DocumentRoot /var/www/html

    # ============================================================
    # API / 静的画像への reverse proxy
    #   Directory ディレクティブより先に書くことで、SPA fallback より優先される。
    #   ProxyPreserveHost: 元の Host ヘッダを保持 (URL 生成時に元のホスト名を使える)
    # ============================================================
    ProxyPreserveHost On
    ProxyRequests Off

    # /api/products → http://localhost:3000/products のように末尾スラッシュで揃える
    ProxyPass        /api/    http://localhost:3000/
    ProxyPassReverse /api/    http://localhost:3000/

    # /static/uploads/xxx.jpg → http://localhost:3000/static/uploads/xxx.jpg
    ProxyPass        /static/ http://localhost:3000/static/
    ProxyPassReverse /static/ http://localhost:3000/static/

    # ============================================================
    # storefront ルート (/var/www/html 直下)
    #   AllowOverride All で .htaccess を許可 → SPA ルーティング fallback を .htaccess に委譲
    # ============================================================
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ============================================================
    # backoffice (/var/www/html/backoffice 配下)
    #   build 時に --base-href=/backoffice/ を指定して配置すること
    # ============================================================
    <Directory /var/www/html/backoffice>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ============================================================
    # ログ出力先
    # ============================================================
    ErrorLog  /var/log/httpd/ec-practice-error.log
    CustomLog /var/log/httpd/ec-practice-access.log combined
</VirtualHost>
